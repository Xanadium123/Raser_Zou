<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zou le Chat — Opération Toilettage !</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a0a2e; font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; overflow: hidden; }
  #canvas-container { width: 100vw; height: 100vh; position: relative; }
  canvas { display: block; }

  #ui-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }

  #hud {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 20px; align-items: center; pointer-events: none;
  }

  .hud-box {
    background: rgba(255,220,100,0.95);
    border: 3px solid #ff8c00;
    border-radius: 16px;
    padding: 8px 18px;
    font-size: 18px;
    font-weight: bold;
    color: #5a2000;
    box-shadow: 0 4px 15px rgba(255,140,0,0.4);
  }

  #fur-bar-container {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none;
  }
  #fur-label {
    color: #ffe066; font-size: 16px; margin-bottom: 6px;
    text-shadow: 0 0 8px #ff8c00;
  }
  #fur-bar-bg {
    width: 300px; height: 28px;
    background: rgba(255,255,255,0.15);
    border: 3px solid #ff8c00;
    border-radius: 20px; overflow: hidden;
  }
  #fur-bar {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #ff6b35, #ff8c00, #ffb347);
    border-radius: 20px;
    transition: width 0.3s ease;
  }

  /* Message panel */
  #message-panel {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(255,240,180,0.97);
    border: 4px solid #ff8c00;
    border-radius: 24px;
    padding: 30px 40px;
    text-align: center;
    max-width: 480px;
    box-shadow: 0 0 40px rgba(255,140,0,0.6);
    pointer-events: all;
    display: none;
  }
  #message-panel h2 { font-size: 28px; color: #5a2000; margin-bottom: 12px; }
  #message-panel p { font-size: 16px; color: #7a3a00; line-height: 1.6; margin-bottom: 18px; }
  #message-panel button {
    background: linear-gradient(135deg, #ff8c00, #ff6b35);
    color: white; border: none; border-radius: 14px;
    padding: 12px 30px; font-size: 18px; font-weight: bold;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 12px rgba(255,100,0,0.4);
    transition: transform 0.1s;
  }
  #message-panel button:hover { transform: scale(1.05); }

  /* Scissors cursor hint */
  #cursor-hint {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    color: rgba(255,220,100,0.7); font-size: 14px;
    pointer-events: none;
  }

  /* Floating hair particles */
  .hair-pop {
    position: absolute;
    font-size: 22px;
    pointer-events: none;
    animation: hairFly 1.2s ease-out forwards;
  }
  @keyframes hairFly {
    0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(360deg); }
  }

  /* Snore ZZZ */
  #snore {
    position: absolute; top: 30%; right: 25%;
    font-size: 30px; color: #ffe066;
    text-shadow: 0 0 12px #ff8c00;
    animation: snoreFloat 2s infinite ease-in-out;
    pointer-events: none; display: none;
  }
  @keyframes snoreFloat {
    0%,100% { transform: translateY(0) scale(1); opacity: 0.8; }
    50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
  }

  #phase-label {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
    color: #ffe066; font-size: 13px; text-shadow: 0 0 8px #ff8c00;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="canvas-container">
  <canvas id="gameCanvas"></canvas>
  <div id="ui-overlay">
    <div id="hud">
      <div class="hud-box">✂️ Clics : <span id="click-count">0</span></div>
      <div class="hud-box">🪮 Poils restants : <span id="fur-count">100</span>%</div>
      <div class="hud-box">😹 Zou : <span id="mood">Zzz...</span></div>
    </div>
    <div id="phase-label" id="phase-label"></div>
    <div id="fur-bar-container">
      <div id="fur-label">🧡 Pelage de Zou</div>
      <div id="fur-bar-bg"><div id="fur-bar"></div></div>
    </div>
    <div id="cursor-hint">✂️ Clique sur Zou pour le raser !</div>
    <div id="snore">💤 ZZZ...</div>

    <div id="message-panel">
      <h2 id="msg-title">Opération Toilettage !</h2>
      <p id="msg-body"></p>
      <button id="msg-btn" onclick="startGame()">C'est parti !</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GAME STATE ──────────────────────────────────────────────────────────────
let furLevel = 100;
let clickCount = 0;
let gamePhase = 'intro'; // intro, sleeping, awake, hiding, caught, done
let phaseTimer = 0;
let hideTarget = null;
let isHidden = false;
let shakeTime = 0;
let gameActive = false;
let hideSpots = [];
let currentHideSpot = 0;
let wakeWarning = false;
let sneezeTime = 0;

// ─── THREE.JS SETUP ──────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a2e);
scene.fog = new THREE.Fog(0x1a0a2e, 18, 40);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 9);
camera.lookAt(0, 1, 0);

// ─── LIGHTS ──────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffd0a0, 0.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffe0b0, 1.2);
sunLight.position.set(5, 10, 5);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
scene.add(sunLight);

const lampLight = new THREE.PointLight(0xff9944, 1.5, 12);
lampLight.position.set(-3, 4, 2);
scene.add(lampLight);

const rimLight = new THREE.DirectionalLight(0x8844ff, 0.4);
rimLight.position.set(-5, 3, -5);
scene.add(rimLight);

// ─── ROOM / ENVIRONMENT ──────────────────────────────────────────────────────
// Floor
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshLambertMaterial({ color: 0x4a3020 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Rug
const rugGeo = new THREE.PlaneGeometry(8, 6);
const rugMat = new THREE.MeshLambertMaterial({ color: 0x8b2252 });
const rug = new THREE.Mesh(rugGeo, rugMat);
rug.rotation.x = -Math.PI/2;
rug.position.y = 0.01;
scene.add(rug);

// Back wall
const wallGeo = new THREE.PlaneGeometry(20, 10);
const wallMat = new THREE.MeshLambertMaterial({ color: 0x2d1b4e });
const backWall = new THREE.Mesh(wallGeo, wallMat);
backWall.position.set(0, 5, -8);
scene.add(backWall);

// Sofa
const sofaGroup = new THREE.Group();
const sofaBody = new THREE.Mesh(new THREE.BoxGeometry(5, 1.2, 2), new THREE.MeshLambertMaterial({color: 0x6b2d8b}));
sofaBody.position.set(0, 0.6, -3);
sofaBody.castShadow = true; sofaBody.receiveShadow = true;
sofaGroup.add(sofaBody);
const sofaBack = new THREE.Mesh(new THREE.BoxGeometry(5, 1.6, 0.3), new THREE.MeshLambertMaterial({color: 0x5a2070}));
sofaBack.position.set(0, 1.7, -3.85);
sofaBack.castShadow = true;
sofaGroup.add(sofaBack);
const sofaArmL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.5, 2), new THREE.MeshLambertMaterial({color: 0x5a2070}));
sofaArmL.position.set(-2.5, 1.15, -3);
sofaGroup.add(sofaArmL);
const sofaArmR = sofaArmL.clone(); sofaArmR.position.x = 2.5;
sofaGroup.add(sofaArmR);
scene.add(sofaGroup);
hideSpots.push({ pos: new THREE.Vector3(0, 0.5, -3), label: "derrière le canapé" });

// Table
const tableTop = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1.5), new THREE.MeshLambertMaterial({color: 0x8b5e3c}));
tableTop.position.set(3.5, 1.1, 1);
tableTop.castShadow = true;
scene.add(tableTop);
for(let i=0;i<4;i++){
  const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1,1.1,0.1), new THREE.MeshLambertMaterial({color:0x6b4020}));
  leg.position.set(3.5+(i<2?-1:1)*0.9, 0.55, 1+(i%2===0?-0.6:0.6));
  scene.add(leg);
}
hideSpots.push({ pos: new THREE.Vector3(3.5, 0.3, 1), label: "sous la table" });

// Curtain / hiding spot
const curtainGeo = new THREE.BoxGeometry(1.5, 4, 0.2);
const curtainMat = new THREE.MeshLambertMaterial({ color: 0x1a6644 });
const curtain = new THREE.Mesh(curtainGeo, curtainMat);
curtain.position.set(-5, 2, -3);
scene.add(curtain);
hideSpots.push({ pos: new THREE.Vector3(-5, 0.5, -2.5), label: "derrière le rideau" });

// Plant pot
const potGeo = new THREE.CylinderGeometry(0.3,0.4,0.6,8);
const pot = new THREE.Mesh(potGeo, new THREE.MeshLambertMaterial({color:0xc0522a}));
pot.position.set(-3, 0.3, 1);
scene.add(pot);
const plantGeo = new THREE.SphereGeometry(0.6,8,8);
const plant = new THREE.Mesh(plantGeo, new THREE.MeshLambertMaterial({color:0x2d8b2d}));
plant.position.set(-3, 1.1, 1);
scene.add(plant);

// ─── ZOU THE CAT ─────────────────────────────────────────────────────────────
const zouGroup = new THREE.Group();

// Fur layers (will disappear as we shave)
const furLayers = [];

// Body
const bodyGeo = new THREE.SphereGeometry(0.7, 16, 12);
const bodyMat = new THREE.MeshLambertMaterial({ color: 0xff8c44 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.scale.set(1.2, 1, 1.1);
body.position.y = 0.7;
body.castShadow = true;
zouGroup.add(body);

// Head
const headGeo = new THREE.SphereGeometry(0.5, 16, 12);
const headMat = new THREE.MeshLambertMaterial({ color: 0xff8c44 });
const head = new THREE.Mesh(headGeo, headMat);
head.position.set(0, 1.7, 0.5);
head.castShadow = true;
zouGroup.add(head);

// Snout
const snoutGeo = new THREE.SphereGeometry(0.22, 10, 8);
const snoutMat = new THREE.MeshLambertMaterial({ color: 0xffb380 });
const snout = new THREE.Mesh(snoutGeo, snoutMat);
snout.position.set(0, 1.62, 0.9);
snout.scale.set(1, 0.7, 0.8);
zouGroup.add(snout);

// Nose
const noseGeo = new THREE.SphereGeometry(0.06, 8, 8);
const noseMat = new THREE.MeshLambertMaterial({ color: 0xff6688 });
const nose = new THREE.Mesh(noseGeo, noseMat);
nose.position.set(0, 1.66, 1.08);
zouGroup.add(nose);

// Eyes
function makeEye(x) {
  const g = new THREE.Group();
  const white = new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8), new THREE.MeshLambertMaterial({color:0xffffff}));
  white.scale.set(1,0.8,0.6);
  const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.065,8,8), new THREE.MeshLambertMaterial({color:0x111111}));
  pupil.position.z = 0.05;
  const shine = new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6), new THREE.MeshLambertMaterial({color:0xffffff}));
  shine.position.set(0.025, 0.025, 0.09);
  g.add(white); g.add(pupil); g.add(shine);
  g.position.set(x, 1.76, 0.86);
  return g;
}
const eyeL = makeEye(-0.18);
const eyeR = makeEye(0.18);
zouGroup.add(eyeL); zouGroup.add(eyeR);

// Ears
function makeEar(x) {
  const g = new THREE.ConeGeometry(0.18, 0.35, 3);
  const m = new THREE.MeshLambertMaterial({ color: 0xff8c44 });
  const ear = new THREE.Mesh(g, m);
  ear.position.set(x, 2.1, 0.45);
  ear.rotation.z = x < 0 ? -0.3 : 0.3;
  const inner = new THREE.Mesh(new THREE.ConeGeometry(0.1,0.2,3), new THREE.MeshLambertMaterial({color:0xffb3b3}));
  inner.position.set(x, 2.1, 0.45);
  inner.rotation.z = x < 0 ? -0.3 : 0.3;
  zouGroup.add(ear); zouGroup.add(inner);
}
makeEar(-0.32); makeEar(0.32);

// Tail
const tailCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, 0.6, -0.8),
  new THREE.Vector3(-0.5, 1.2, -1.0),
  new THREE.Vector3(-0.3, 1.8, -0.7),
  new THREE.Vector3(0.1, 1.6, -0.5)
]);
const tailGeo = new THREE.TubeGeometry(tailCurve, 12, 0.08, 6, false);
const tailMat = new THREE.MeshLambertMaterial({ color: 0xff8c44 });
const tail = new THREE.Mesh(tailGeo, tailMat);
zouGroup.add(tail);

// Legs
function makeLeg(x, z) {
  const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.12,0.5,8), new THREE.MeshLambertMaterial({color:0xff8c44}));
  leg.position.set(x, 0.25, z);
  const paw = new THREE.Mesh(new THREE.SphereGeometry(0.14,8,8), new THREE.MeshLambertMaterial({color:0xffb380}));
  paw.position.set(x, 0.0, z);
  paw.scale.set(1.2,0.7,1.4);
  zouGroup.add(leg); zouGroup.add(paw);
}
makeLeg(-0.4, 0.4); makeLeg(0.4, 0.4);
makeLeg(-0.4, -0.4); makeLeg(0.4, -0.4);

// FUR BALLS — fluffy pom-poms around the body
const furBallPositions = [
  {x:0,y:1.1,z:0.7},{x:-0.5,y:0.9,z:0.4},{x:0.5,y:0.9,z:0.4},
  {x:0,y:0.6,z:0},{x:-0.6,y:1.0,z:-0.2},{x:0.6,y:1.0,z:-0.2},
  {x:0,y:1.4,z:-0.2},{x:-0.3,y:0.5,z:0.6},{x:0.3,y:0.5,z:0.6},
  {x:-0.2,y:1.5,z:0.5},{x:0.2,y:1.5,z:0.5},
  {x:-0.8,y:0.8,z:0},{x:0.8,y:0.8,z:0},
  {x:0,y:0.4,z:-0.5},{x:-0.5,y:1.3,z:0.3},{x:0.5,y:1.3,z:0.3},
  {x:0.1,y:1.8,z:0.3},{x:-0.4,y:0.3,z:0.0},{x:0.4,y:0.3,z:0.0},
  {x:0,y:1.1,z:-0.6}
];

const furColors = [0xff8c44, 0xffa066, 0xffb380, 0xff7733, 0xffcc99];
furBallPositions.forEach((pos, i) => {
  const size = 0.12 + Math.random() * 0.14;
  const furBall = new THREE.Mesh(
    new THREE.SphereGeometry(size, 8, 8),
    new THREE.MeshLambertMaterial({ color: furColors[i % furColors.length] })
  );
  furBall.position.set(pos.x, pos.y, pos.z);
  furBall.castShadow = true;
  zouGroup.add(furBall);
  furLayers.push(furBall);
});

// Blush cheeks
function makeBlush(x) {
  const b = new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8), new THREE.MeshLambertMaterial({color:0xff8888,transparent:true,opacity:0.5}));
  b.position.set(x, 1.62, 0.88);
  b.scale.set(1.5,0.8,0.3);
  zouGroup.add(b);
}
makeBlush(-0.28); makeBlush(0.28);

zouGroup.position.set(0, 0, 1);
scene.add(zouGroup);

// ─── SCISSORS INDICATOR ───────────────────────────────────────────────────────
const scissorsGroup = new THREE.Group();
// Blade 1
const blade1 = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.4,0.04),new THREE.MeshLambertMaterial({color:0xcccccc}));
blade1.position.x = -0.03;
blade1.rotation.z = 0.3;
const blade2 = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.4,0.04),new THREE.MeshLambertMaterial({color:0xaaaaaa}));
blade2.position.x = 0.03;
blade2.rotation.z = -0.3;
scissorsGroup.add(blade1); scissorsGroup.add(blade2);
scissorsGroup.visible = false;
scene.add(scissorsGroup);

// ─── RAYCASTER ───────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let catMeshes = [];
zouGroup.traverse(obj => { if(obj.isMesh) catMeshes.push(obj); });

// ─── UI HELPERS ──────────────────────────────────────────────────────────────
const msgPanel = document.getElementById('message-panel');
const msgTitle = document.getElementById('msg-title');
const msgBody  = document.getElementById('msg-body');
const msgBtn   = document.getElementById('msg-btn');
const snoreEl  = document.getElementById('snore');
const phaseLabel = document.getElementById('phase-label');

function showMessage(title, body, btnText, callback) {
  msgTitle.textContent = title;
  msgBody.innerHTML = body;
  msgBtn.textContent = btnText;
  msgPanel.style.display = 'block';
  msgBtn.onclick = () => {
    msgPanel.style.display = 'none';
    if(callback) callback();
  };
}

function hideMessage() { msgPanel.style.display = 'none'; }

function updateHUD() {
  document.getElementById('click-count').textContent = clickCount;
  document.getElementById('fur-count').textContent = Math.round(furLevel);
  document.getElementById('fur-bar').style.width = furLevel + '%';
  // Mood
  let mood = 'Zzz...';
  if(gamePhase === 'awake') mood = '😾 Méfiant !';
  else if(gamePhase === 'hiding') mood = '🙈 Caché !';
  else if(gamePhase === 'caught') mood = '😹 Attrapé !';
  else if(gamePhase === 'done') mood = '✨ Magnifique !';
  else if(isHidden) mood = '🫣 Oh non !';
  document.getElementById('mood').textContent = mood;
}

// ─── HAIR PARTICLE FX ────────────────────────────────────────────────────────
function spawnHairFX(clientX, clientY) {
  const emojis = ['🧡','🪮','〰️','✨','🌀','💫'];
  for(let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'hair-pop';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = clientX + 'px';
    el.style.top = clientY + 'px';
    const dx = (Math.random()-0.5)*120;
    const dy = -60 - Math.random()*80;
    el.style.setProperty('--dx', dx+'px');
    el.style.setProperty('--dy', dy+'px');
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1300);
  }
}

// ─── GAME PHASES ─────────────────────────────────────────────────────────────
function startGame() {
  gamePhase = 'sleeping';
  gameActive = true;
  hideMessage();
  snoreEl.style.display = 'block';
  phaseLabel.textContent = '💤 Zou dort... Approchez doucement !';
  zouGroup.position.set(0, 0, 1);
}

function triggerAwake() {
  gamePhase = 'awake';
  snoreEl.style.display = 'none';
  wakeWarning = true;
  phaseLabel.textContent = '😾 Zou se réveille ! Vite, rasez-le avant qu\'il se cache !';
  // Eye open animation — handled in update
}

function triggerHide() {
  gamePhase = 'hiding';
  isHidden = true;
  currentHideSpot = (currentHideSpot + 1) % hideSpots.length;
  const spot = hideSpots[currentHideSpot];
  hideTarget = spot.pos.clone();
  phaseLabel.textContent = `🙈 Zou s\'est caché ${spot.label} ! Retrouvez-le !`;
  showMessage(
    '🙈 Il s\'est échappé !',
    `Zou court se cacher <strong>${spot.label}</strong> ! <br>Il ne veut <em>vraiment pas</em> être rasé... <br>Retrouvez-le et cliquez dessus pour continuer !`,
    'Je le retrouve !',
    () => { gamePhase = 'caught'; isHidden = false; }
  );
}

function checkWin() {
  if(furLevel <= 0) {
    furLevel = 0;
    gamePhase = 'done';
    gameActive = false;
    setTimeout(()=>{
      showMessage(
        '🎉 Zou est rasé de frais !',
        `Bravo ! Zou le chat roux est enfin débarrassé de ses boules de poils ! <br><br>Il est <strong>magnifique</strong> (et un peu vexé, mais ça lui passera 😺).<br><br>Il a tenté de se cacher <strong>${Math.max(0, currentHideSpot)}</strong> fois mais vous avez été plus malin(e) que lui ! <br><br>Total de clics : <strong>${clickCount}</strong>`,
        '🔁 Rejouer',
        () => { location.reload(); }
      );
    }, 500);
  }
}

// ─── CLICK HANDLER ───────────────────────────────────────────────────────────
canvas.addEventListener('click', (e) => {
  if(!gameActive) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(catMeshes);
  if(hits.length > 0) {
    clickCount++;
    const reduction = 1.5 + Math.random();
    furLevel = Math.max(0, furLevel - reduction);

    // Remove fur balls progressively
    const furIdx = Math.floor((1 - furLevel/100) * furLayers.length);
    for(let i = 0; i < furLayers.length; i++) {
      furLayers[i].visible = i >= furIdx;
    }

    shakeTime = 0.4;
    spawnHairFX(e.clientX, e.clientY);
    updateHUD();

    // Phase transitions
    if(gamePhase === 'sleeping' && clickCount >= 5 && Math.random() < 0.3) {
      triggerAwake();
    }
    if(gamePhase === 'awake' && clickCount > 0 && (clickCount % 12 === 0) && furLevel > 15) {
      triggerHide();
    }
    if(gamePhase === 'caught' || gamePhase === 'awake' || gamePhase === 'sleeping') {
      checkWin();
    }
  }
});

canvas.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(catMeshes);
  canvas.style.cursor = hits.length > 0 ? 'crosshair' : 'default';
  // Move scissor indicator
  if(hits.length > 0) {
    scissorsGroup.visible = true;
    scissorsGroup.position.copy(hits[0].point);
    scissorsGroup.position.y += 0.3;
  } else {
    scissorsGroup.visible = false;
  }
});

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let t = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  t += dt;

  // Cat bobbing / breathing
  const breathe = Math.sin(t * 1.5) * 0.04;
  body.scale.y = 1 + breathe;

  // Tail wagging
  tail.rotation.y = Math.sin(t * 2) * 0.4;
  tail.rotation.x = Math.sin(t * 1.3) * 0.15;

  // Eye blinking
  const blinkCycle = Math.sin(t * 1.2);
  const blink = blinkCycle > 0.98;
  eyeL.scale.y = blink ? 0.1 : 1;
  eyeR.scale.y = blink ? 0.1 : 1;

  // Phase: sleeping — curl down
  if(gamePhase === 'sleeping') {
    zouGroup.rotation.x = Math.sin(t*0.5)*0.05;
    // snore bounce
    snoreEl.style.opacity = 0.6 + 0.4*Math.sin(t*2);
  }

  // Phase: awake — look around nervously
  if(gamePhase === 'awake') {
    head.rotation.y = Math.sin(t * 3) * 0.4;
    head.rotation.x = Math.sin(t * 2.1) * 0.15;
    zouGroup.rotation.y = Math.sin(t * 1.5) * 0.2;
  }

  // Phase: hiding — move cat to hiding spot
  if(gamePhase === 'hiding' && hideTarget) {
    zouGroup.position.lerp(hideTarget, 0.05);
    zouGroup.rotation.y += dt * 2;
    // Make cat smaller as it "hides"
    zouGroup.scale.lerp(new THREE.Vector3(0.4,0.4,0.4), 0.04);
  }

  // Phase: caught — zoom back
  if(gamePhase === 'caught') {
    zouGroup.position.lerp(new THREE.Vector3(0,0,1), 0.06);
    zouGroup.scale.lerp(new THREE.Vector3(1,1,1), 0.06);
    zouGroup.rotation.y *= 0.92;
  }

  // Phase: done — happy spin
  if(gamePhase === 'done') {
    zouGroup.rotation.y += dt * 1.5;
    zouGroup.position.y = Math.abs(Math.sin(t*3)) * 0.3;
    lampLight.intensity = 1.5 + Math.sin(t*5)*0.8;
  }

  // Shake on click
  if(shakeTime > 0) {
    shakeTime -= dt;
    const s = shakeTime * 8;
    zouGroup.position.x += Math.sin(t*40)*0.02*s;
    zouGroup.position.y += Math.sin(t*35)*0.01*s;
  }

  // Lamp flicker
  lampLight.intensity = 1.4 + Math.sin(t*7)*0.1;

  // Scissor animation
  if(scissorsGroup.visible) {
    blade1.rotation.z = 0.3 + Math.sin(t*8)*0.2;
    blade2.rotation.z = -0.3 - Math.sin(t*8)*0.2;
    scissorsGroup.rotation.y += dt;
  }

  // Camera subtle sway
  camera.position.x = Math.sin(t*0.3)*0.3;
  camera.lookAt(0, 1.2, 0);

  renderer.render(scene, camera);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Show intro
showMessage(
  '🧡 Opération Zou !',
  `Zou est un chat roux absolument adorable… mais il a un <strong>énorme problème</strong> : des boules de poils partout ! 🐱<br><br>
  Il dort profondément sur le canapé. C'est votre chance de le raser ! <br><br>
  ⚠️ Mais attention — si vous l'agacez trop, il va se <strong>cacher</strong> !<br><br>
  <em>Cliquez sur Zou pour le raser. Bonne chance !</em>`,
  '✂️ On commence !',
  startGame
);

animate();
</script>
